<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2D Splatoon - Ultimate Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #e0e0e0; touch-action: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        canvas { position: absolute; top: 0; left: 0; transform-origin: 0 0; }
        #bgCanvas { z-index: 1; } #fgCanvas { z-index: 2; }
        
        #homeScreen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.85); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; color: white; text-align: center; overflow-y: auto; padding-top: 20px;}
        #homeScreen h1 { font-size: 36px; margin: 0 0 10px 0; color: #00ffcc; text-shadow: 2px 2px 0px #ff00cc; }
        .panel { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; margin-bottom: 15px; width: 90%; max-width: 450px; }
        .panel h2 { margin: 0 0 10px 0; font-size: 16px; color: #ffd700; border-bottom: 1px solid #555; padding-bottom: 5px;}
        .start-btn { background: #ffcc00; color: #333; border: none; padding: 8px 12px; font-size: 14px; font-weight: bold; border-radius: 8px; cursor: pointer; margin: 4px; box-shadow: 0 4px 0 #b38f00; width: 45%; }
        .start-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #b38f00; }
        .btn-chaos { background: #ff3366; box-shadow: 0 4px 0 #b30033; color: white; }
        
        .weapon-select { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin-bottom: 10px; }
        .wpn-btn { background: #555; color: white; border: 2px solid #333; padding: 6px; border-radius: 5px; cursor: pointer; width: 31%; font-weight: bold; font-size: 11px; }
        .wpn-btn.active { background: #00ffcc; color: #000; border-color: #fff; }
        #wpnDesc { font-size: 12px; background: rgba(0,0,0,0.5); padding: 8px; border-radius: 5px; color: #ddd; min-height: 30px; }
        
        input[type="text"], select { width: 90%; padding: 8px; border-radius: 5px; border: none; font-size: 14px; font-weight: bold; text-align: center; margin-bottom: 5px; }
        .slider-container { display: flex; flex-direction: column; align-items: center; gap: 5px; margin-top: 10px;}
        #hazardSlider { width: 90%; }

        #uiTop { position: absolute; top: 0; left: 0; width: 100vw; display: flex; justify-content: center; z-index: 10; pointer-events: none; padding-top: 10px;}
        #timerBox { background: rgba(0,0,0,0.7); color: white; font-size: 24px; font-weight: bold; padding: 5px 20px; border-radius: 20px; border: 2px solid #fff; }
        
        #uiLeft { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(255, 255, 255, 0.9); padding: 10px; border-radius: 8px; pointer-events: none; box-shadow: 0 2px 5px rgba(0,0,0,0.2); display: none; }
        .score-text { font-size: 14px; font-weight: bold; margin: 2px 0; }
        .gauge-container { width: 120px; height: 10px; background: #ddd; border-radius: 5px; margin-top: 5px; overflow: hidden; border: 1px solid #aaa; }
        #inkBar, #spBar { height: 100%; width: 100%; }
        #inkBar { background: #00ff00; } #spBar { background: #ffcc00; width: 0%; }
        
        #gachiUi { position: absolute; top: 50px; left: 50%; transform: translateX(-50%); z-index: 10; background: rgba(255, 255, 255, 0.9); padding: 5px 15px; border-radius: 8px; font-weight: bold; display: none; text-align: center; border: 2px solid #333; }
        #gachiModeName { font-size: 12px; color: #666; }
        .gachi-counts { display: flex; gap: 20px; font-size: 20px; }
        #c0 { color: #007bff; } #c1 { color: #ff7f00; }

        #salmonUi { position: absolute; top: 10px; right: 10px; z-index: 10; background: rgba(0, 0, 0, 0.8); padding: 10px 20px; border-radius: 8px; font-weight: bold; display: none; text-align: center; border: 2px solid #ffcc00; color: white;}
        #salmonWaveText { color: #00ffcc; font-size: 16px; margin-bottom: 5px; border-bottom: 1px solid #555; padding-bottom: 2px; }
        #salmonUi span { font-size: 18px; color: #ffd700; }
        
        #okashiraHpUi { position: absolute; top: 90px; right: 10px; z-index: 10; background: rgba(0, 0, 0, 0.8); padding: 10px; border-radius: 8px; border: 2px solid #ff0000; color: white; text-align: center; display: none; }
        .okashira-gauge { width: 150px; height: 15px; background: #333; border-radius: 5px; margin-top: 5px; overflow: hidden; }
        #okashiraHpBar { width: 100%; height: 100%; background: #ff0000; }

        #endScreen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.9); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; text-shadow: 1px 1px 0px #000; overflow-y: auto; padding: 20px 0;}
        #endTitle { font-size: 40px; font-weight: bold; color: #ffcc00; margin-bottom: 10px; text-shadow: 2px 2px 0px #000; }
        #endMessage { font-size: 20px; margin-bottom: 15px; font-weight: bold; }
        #endDetail { width: 90%; max-width: 600px; background: rgba(255,255,255,0.1); border-radius: 8px; padding: 10px; font-size: 12px; margin-bottom: 20px; overflow-x: auto; }
        #endDetail table { width: 100%; border-collapse: collapse; }
        #endDetail th, #endDetail td { padding: 5px; border-bottom: 1px solid #555; text-align: center; }
        #endDetail th { background: rgba(0,0,0,0.5); color: #00ffcc; }

        /* Records Modal */
        #recordsScreen { position:absolute; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.95); z-index:200; display:none; flex-direction:column; align-items:center; color:white; overflow-y:auto; padding:20px 0; }
        #recordsList { width:90%; max-width:600px; margin-top:15px; text-align: left;}

        .joystick { position: absolute; bottom: 30px; width: 100px; height: 100px; border-radius: 50%; background: rgba(0, 0, 0, 0.15); border: 2px solid rgba(0,0,0,0.3); display: none; z-index: 5; }
        .joystick-knob { position: absolute; top: 25px; left: 25px; width: 50px; height: 50px; border-radius: 50%; background: rgba(0, 0, 0, 0.4); }
        #joyLeft { left: 20px; } #joyRight { right: 20px; }
        .action-btn { position: absolute; display: none; border-radius: 50%; background: rgba(255,255,255,0.8); border: 2px solid #333; z-index: 5; font-weight: bold; text-align: center; font-size: 14px; color:#000; }
        #btnHide { bottom: 30px; right: 140px; width: 50px; height: 50px; line-height: 50px; }
        #btnSub { bottom: 140px; right: 90px; width: 45px; height: 45px; line-height: 45px; }
        #btnSp { bottom: 140px; right: 20px; width: 55px; height: 55px; line-height: 55px; background: #fffacd; }
    </style>
</head>
<body>
    <div id="achievementUi" style="position:absolute; top:20px; left:50%; transform:translateX(-50%); background:rgba(255,215,0,0.9); color:#000; padding:10px 20px; border-radius:10px; font-weight:bold; display:none; z-index:300; border:2px solid #fff; box-shadow:0 0 10px #ff0;"></div>
    <div id="homeScreen">
        <h1>2D Splatoon Ultimate</h1>
        <div class="panel">
            <h2>0. Player Identity</h2>
            <div style="display:flex; justify-content:center; gap:5px; margin-bottom:5px;">
                <select id="title1" style="width:45%;"></select>
                <select id="title2" style="width:45%;"></select>
            </div>
            <input type="text" id="playerNameInput" value="Player">
            <select id="stageSelect" style="margin-top:5px; width:92%;">
                <option value="#e0e0e0">Bate Park (Concrete)</option>
                <option value="#b0e0e6">Mahi Resort (Pool)</option>
                <option value="#deb887">Hako Warehouse (Cardboard)</option>
                <option value="#2f4f4f">Moray Towers (Night)</option>
            </select>
        </div>
        <div class="panel" style="max-height: 200px; overflow-y: auto;">
            <h2>1. Select Weapon</h2>
            <div class="weapon-select" id="wpnList"></div>
            <div id="wpnDesc"></div>
            <div style="font-size:11px; margin-top:5px; color:#aaa;">※潜伏/回復はShiftキー、チャージ・横振りはスペースキー(PC)</div>
        </div>
        <div class="panel">
            <h2>2. Salmon Run Settings</h2>
            <div class="slider-container">
                <label>危険度 (Hazard Level): <span id="hazardVal">100</span>%</label>
                <input type="range" id="hazardSlider" min="0" max="333" value="100" oninput="document.getElementById('hazardVal').innerText=this.value">
            </div>
        </div>
        <div class="panel">
            <h2>3. Select Mode</h2>
            <button class="start-btn" onclick="startGame(4, 'turf')">Turf War 4v4</button>
            <button class="start-btn" onclick="startGame(16, 'turf')">Turf War 16v16</button>
            <button class="start-btn" style="background:#00fa9a" onclick="startGame(4, 'zones')">Splat Zones 4v4</button>
            <button class="start-btn" style="background:#00fa9a" onclick="startGame(16, 'zones')">Splat Zones 16v16</button>
            <button class="start-btn" style="background:#9932cc; color:white;" onclick="startGame(4, 'tower')">Tower 4v4</button>
            <button class="start-btn" style="background:#9932cc; color:white;" onclick="startGame(16, 'tower')">Tower 16v16</button>
            <button class="start-btn" style="background:#ff8c00" onclick="startGame(4, 'rainmaker')">Rainmaker 4v4</button>
            <button class="start-btn" style="background:#ff8c00" onclick="startGame(16, 'rainmaker')">Rainmaker 16v16</button>
            <button class="start-btn" style="background:#ff69b4; color:white;" onclick="startGame(4, 'clam')">Clam Blitz 4v4</button>
            <button class="start-btn" style="background:#ff69b4; color:white;" onclick="startGame(16, 'clam')">Clam Blitz 16v16</button>
            <button class="start-btn btn-chaos" onclick="startGame(4, 'salmon')">Salmon Run 4 Players</button>
            <button class="start-btn btn-chaos" onclick="startGame(16, 'salmon')">Salmon Run 16 Players</button>
            <button class="start-btn" style="background:#ffea00; color:#333; width: 93%;" onclick="startGame(1, 'hero')">Hero Mode (Single)</button>
            <button class="start-btn" onclick="showRecords()" style="background:#0088ff; color:white; width:93%; margin-top:10px;">View Records & Memories</button>
        </div>
    </div>

    <div id="recordsScreen">
        <h1 style="color:#00ffcc;">Records & Memories</h1>
        <div style="width:90%; max-width:600px; display:flex; justify-content:space-between; margin-bottom:10px;">
            <button class="start-btn" onclick="clearRecords()" style="background:#ff3366; color:white;">Data Initialize</button>
            <button class="start-btn" onclick="document.getElementById('recordsScreen').style.display='none'">Close</button>
        </div>
        <div id="recordsList"></div>
    </div>

    <div id="endScreen">
        <div id="endTitle">FINISH!</div>
        <div id="endMessage"></div>
        <div id="endDetail"></div>
        <button class="start-btn" style="margin-top:10px; width:200px; background:#4CAF50; color:white;" onclick="downloadCSV()">Download CSV</button>
        <button class="start-btn" style="margin-top:10px; width:200px; background:#9932cc; color:white;" onclick="startReplay()">Battle Memory (Latest)</button>
        <button class="start-btn" style="margin-top:10px; width:200px;" onclick="resetToHome()">Back to Home</button>
    </div>

    <canvas id="bgCanvas"></canvas><canvas id="fgCanvas"></canvas>

    <div id="uiTop"><div id="timerBox">3:00</div></div>
    
    <div id="uiLeft">
        <div id="kitInfo" style="font-size: 12px; margin-bottom:5px;"></div>
        <div class="score-text" id="score0" style="color:#007bff">Blue: 0%</div>
        <div class="score-text" id="score1" style="color:#ff7f00">Orange: 0%</div>
        <div class="gauge-container"><div id="inkBar"></div></div>
        <div class="gauge-container"><div id="spBar"></div></div>
    </div>
    
    <div id="gachiUi"><div id="gachiModeName"></div><div class="gachi-counts"><span id="c0">100</span> - <span id="c1">100</span></div></div>
    <div id="clamUi" style="position: absolute; top: 90px; left: 50%; transform: translateX(-50%); z-index: 10; background: rgba(255, 255, 255, 0.9); padding: 5px 15px; border-radius: 8px; font-weight: bold; display: none; text-align: center; border: 2px solid #ff69b4; color:#ff69b4;">My Clams: <span id="myClams">0</span> / 10</div>

    <div id="salmonUi">
        <div id="salmonWaveText">WAVE 1</div>
        <div>ノルマ / QUOTA</div>
        <span id="salmonEggCount">0 / 15</span>
    </div>
    <div id="okashiraHpUi">
        <div>オカシラシャケ</div>
        <div class="okashira-gauge"><div id="okashiraHpBar"></div></div>
    </div>

    <div id="killLog" style="position:absolute; bottom:25%; left:50%; transform:translateX(-50%); z-index:20; font-size:20px; font-weight:bold; color:white; text-shadow:2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; opacity:0; transition:opacity 0.3s ease-out; pointer-events:none;"></div>

    <div id="joyLeft" class="joystick"><div id="knobLeft" class="joystick-knob"></div></div>
    <div id="joyRight" class="joystick"><div id="knobRight" class="joystick-knob"></div></div>
    <div id="btnHide" class="action-btn">HIDE</div><div id="btnSub" class="action-btn">SUB</div><div id="btnSp" class="action-btn">SP</div>

<script>
        let achievements = JSON.parse(localStorage.getItem('splatoon_achievements') || '{}');
    function unlockAchievement(id, name) {
        if (!achievements[id]) {
            achievements[id] = true;
            localStorage.setItem('splatoon_achievements', JSON.stringify(achievements));
            let ui = document.getElementById('achievementUi');
            ui.innerText = `🏆 実績解除: ${name}`;
            ui.style.display = 'block';
            setTimeout(() => ui.style.display = 'none', 3000);
        }
    }
    const TITLES_1 = ['かけ出しの', '熟練の', '伝説の', '永遠の', 'やられがちな', 'イケイケな', '孤高の', '神に選ばれし', '限界突破の'];
    const TITLES_2 = ['イカ', 'タコ', 'バイトリーダー', 'シューター使い', 'ローラー使い', 'チャージャー使い', 'ブラスター使い', 'スロッシャー使い', 'フデ使い'];
    const t1 = document.getElementById('title1'); const t2 = document.getElementById('title2');
    TITLES_1.forEach(t => t1.innerHTML += `<option value="${t}">${t}</option>`);
    TITLES_2.forEach(t => t2.innerHTML += `<option value="${t}">${t}</option>`);

    const bgCanvas = document.getElementById('bgCanvas'); const fgCanvas = document.getElementById('fgCanvas');
    const bgCtx = bgCanvas.getContext('2d'); const fgCtx = fgCanvas.getContext('2d');
    let width = window.innerWidth; let height = window.innerHeight;
    
    let STAGE_W = width * 2; let STAGE_H = height * 2;
    let camX = 0; let camY = 0;
    let currentStageBg = '#e0e0e0';

    const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
    const TEAM_COLORS = ['#007bff', '#ff7f00']; const GRID_SIZE = 15; 
    let cols = Math.ceil(STAGE_W / GRID_SIZE); let rows = Math.ceil(STAGE_H / GRID_SIZE);
    let inkGrid = [];
    
    let players = [], bullets = [], bombs = [], strikes = [], goldenEggs = [];
    let gameLoopId, gameMode = 'turf', isGameOver = false;
    let selectedWeaponId = 0;
    
    let gameTimeLeft = 180; let lastTime = 0; let frameCount = 0;
    let bestCount = [100, 100];
    let eggCount = 0; let eggQuota = 15;
    let currentWave = 1; let isExtraWave = false; let hazardLevel = 100;
    let heroStage = 1;
    let basket = { x: STAGE_W / 2, y: STAGE_H / 2, radius: 40 };

    let killLogTimer;
    function showKillLog(msg) {
        let el = document.getElementById('killLog');
        el.innerText = msg;
        el.style.opacity = 1; el.style.transform = "translateX(-50%) scale(1.2)";
        setTimeout(() => el.style.transform = "translateX(-50%) scale(1)", 100);
        clearTimeout(killLogTimer);
        killLogTimer = setTimeout(() => { el.style.opacity = 0; }, 1500);
    }

    let replayFrames = [];
    let replaySplatEvents = [];
    let replayKillEvents = [];
    let isReplayMode = false;
    let replayCurrentFrame = 0;
    let replayTargetIndex = 0;
    let prevMouseDownReplay = false;

    // 武器3倍細分化・スペシャル/サブ拡充
    const WEAPONS = {
        SPLOOSH: { id: 0, name: 'Sploosh-o-matic', fireRate: 4, bulletSpeed: 12, damage: 38, inkSize: 28, spread: 0.3, inkCost: 1.0, sub: 'CURLING', sp: 'SPLASHDOWN', desc: '超接近戦特化。サブ: カーリング / SP: チャクチ' },
        SPLASHOOTER: { id: 1, name: 'Splattershot', fireRate: 6, bulletSpeed: 14, damage: 35, inkSize: 25, spread: 0.1, inkCost: 1.5, sub: 'QUICK', sp: 'TENTAMISSILES', desc: '標準的な連射ブキ。サブ: クイック / SP: マルチミサイル' },
        GAL52: { id: 2, name: '.52 Gal', fireRate: 9, bulletSpeed: 13, damage: 52, inkSize: 28, spread: 0.15, inkCost: 2.5, sub: 'SPLASH', sp: 'BOOYAH_BOMB', desc: '高火力・低連射。サブ: スプラッシュ / SP: ナイスダマ' },
        NZAP: { id: 3, name: 'N-ZAP', fireRate: 5, bulletSpeed: 15, damage: 28, inkSize: 23, spread: 0.08, inkCost: 1.2, sub: 'SUCTION', sp: 'TORNADO', desc: '連射と機動力。サブ: キューバン / SP: トルネード' },
        PROMODELER: { id: 4, name: 'Aerospray MG', fireRate: 3, bulletSpeed: 11, damage: 24, inkSize: 20, spread: 0.25, inkCost: 0.8, sub: 'SUCTION', sp: 'BOMB_RUSH', desc: '塗り特化の速射。サブ: キューバン / SP: ボムラッシュ' },

        SPLATROLLER: { id: 5, name: 'Splat Roller', fireRate: 30, bulletSpeed: 16, damage: 100, inkSize: 35, spread: 0.4, inkCost: 8, sub: 'CURLING', sp: 'SPLASHDOWN', desc: '標準ローラー。サブ: カーリング / SP: チャクチ' },
        DYNAMO: { id: 6, name: 'Dynamo Roller', fireRate: 50, bulletSpeed: 14, damage: 150, inkSize: 50, spread: 0.5, inkCost: 18, sub: 'SPLASH', sp: 'BOOYAH_BOMB', desc: '超範囲・高火力・遅。サブ: スプラッシュ / SP: ナイスダマ' },
        CARBON: { id: 7, name: 'Carbon Roller', fireRate: 20, bulletSpeed: 18, damage: 80, inkSize: 25, spread: 0.3, inkCost: 5, sub: 'QUICK', sp: 'TENTAMISSILES', desc: '軽量・高速。サブ: クイック / SP: マルチミサイル' },

        BLASTER: { id: 8, name: 'Blaster', fireRate: 45, bulletSpeed: 10, damage: 80, inkSize: 50, spread: 0, inkCost: 10, sub: 'SPLASH', sp: 'TORNADO', desc: '標準ブラスター。サブ: スプラッシュ / SP: トルネード' },
        NOVA: { id: 9, name: 'Luna Blaster', fireRate: 30, bulletSpeed: 8, damage: 70, inkSize: 45, spread: 0, inkCost: 8, sub: 'SPLASH', sp: 'BOMB_RUSH', desc: '近距離・連射。サブ: スプラッシュ / SP: ボムラッシュ' },
        RAPID: { id: 10, name: 'Rapid Blaster', fireRate: 25, bulletSpeed: 14, damage: 50, inkSize: 35, spread: 0, inkCost: 7, sub: 'SUCTION', sp: 'TENTAMISSILES', desc: '長射程・連射。サブ: キューバン / SP: マルチミサイル' },

        SPLATCHARGER: { id: 11, name: 'Splat Charger', fireRate: 50, bulletSpeed: 30, damage: 100, inkSize: 15, spread: 0, inkCost: 18, sub: 'SPLASH', sp: 'TORNADO', desc: '標準チャージャー。サブ: スプラッシュ / SP: トルネード' },
        LITER: { id: 12, name: 'E-liter 4K', fireRate: 70, bulletSpeed: 35, damage: 150, inkSize: 15, spread: 0, inkCost: 25, sub: 'SUCTION', sp: 'BOOYAH_BOMB', desc: '超長射程・遅。サブ: キューバン / SP: ナイスダマ' },
        SQUIFFER: { id: 13, name: 'Squiffer', fireRate: 35, bulletSpeed: 25, damage: 80, inkSize: 15, spread: 0, inkCost: 12, sub: 'QUICK', sp: 'SPLASHDOWN', desc: 'チャージが早い。サブ: クイック / SP: チャクチ' },

        SLOSHER: { id: 14, name: 'Slosher', fireRate: 35, bulletSpeed: 12, damage: 70, inkSize: 40, spread: 0.2, inkCost: 10, sub: 'SUCTION', sp: 'TORNADO', desc: '標準スロッシャー。サブ: キューバン / SP: トルネード' },
        TRI_SLOSHER: { id: 15, name: 'Tri-Slosher', fireRate: 25, bulletSpeed: 10, damage: 62, inkSize: 35, spread: 0.4, inkCost: 8, sub: 'QUICK', sp: 'TENTAMISSILES', desc: '3方向・連射。サブ: クイック / SP: マルチミサイル' },
        MACHINE: { id: 16, name: 'Sloshing Machine', fireRate: 40, bulletSpeed: 11, damage: 76, inkSize: 40, spread: 0.1, inkCost: 12, sub: 'SPLASH', sp: 'SPLASHDOWN', desc: '渦巻き型。サブ: スプラッシュ / SP: チャクチ' },

        INKBRUSH: { id: 17, name: 'Inkbrush', fireRate: 4, bulletSpeed: 18, damage: 25, inkSize: 20, spread: 0.5, inkCost: 1, sub: 'SPLASH', sp: 'SPLASHDOWN', desc: '超高速・近接。サブ: スプラッシュ / SP: チャクチ' },
        OCTOBRUSH: { id: 18, name: 'Octobrush', fireRate: 6, bulletSpeed: 15, damage: 40, inkSize: 25, spread: 0.4, inkCost: 2, sub: 'SUCTION', sp: 'BOOYAH_BOMB', desc: '威力・範囲向上。サブ: キューバン / SP: ナイスダマ' },
        MANEUVER: { id: 19, name: 'Splat Dualies', fireRate: 5, bulletSpeed: 14, damage: 30, inkSize: 22, spread: 0.25, inkCost: 1.0, sub: 'QUICK', sp: 'LASER', desc: 'マニューバー: 2丁拳銃で連射。サブ: クイック / SP: メガホンレーザー' },

            let hs = document.getElementById('homeScreen');
            let rs = document.getElementById('recordsScreen');
            if ((hs && hs.style.display !== 'none' && hs.style.display !== '') || (rs && rs.style.display !== 'none' && rs.style.display !== '')) return;

    // --- LocalStorage 保存処理 ---
    function saveResultToLocal(title, detail, htmlStr) {
        let results = JSON.parse(localStorage.getItem('splatoon_results') || '[]');
        results.unshift({ date: new Date().toLocaleString(), title: title, detail: detail, html: htmlStr });
        if(results.length > 30) results.pop();
        localStorage.setItem('splatoon_results', JSON.stringify(results));
        
        let memories = JSON.parse(localStorage.getItem('splatoon_memories') || '[]');
        let memObj = { date: new Date().toLocaleString(), title: title, mode: gameMode, frames: replayFrames, events: { splats: replaySplatEvents, kills: replayKillEvents }, stage_w: STAGE_W, stage_h: STAGE_H, stage_c: currentStageBg };
        memories.unshift(memObj);
        if(memories.length > 3) memories.pop(); // Max 3 replays to prevent QuotaExceeded
        
        let saved = false;
        while(!saved && memories.length > 0) {
            try { localStorage.setItem('splatoon_memories', JSON.stringify(memories)); saved = true; } 
            catch(e) { memories.pop(); }
        }
    }

    function showRecords() {
        let results = JSON.parse(localStorage.getItem('splatoon_results') || '[]');
        let memories = JSON.parse(localStorage.getItem('splatoon_memories') || '[]');
        
        let html = '<h3 style="color:#ffd700;">Battle Memories (Top 3)</h3>';
        if(memories.length === 0) html += '<p>No memory</p>';
        memories.forEach((m, i) => {
            html += `<div style="background:#333; padding:10px; margin-bottom:5px; border-radius:5px; font-size:14px;">
                ${m.date}<br>[${m.mode}] ${m.title}
                <button onclick="startMemoryReplay(${i})" style="margin-left:10px; padding:5px 10px; background:#00ffcc; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">Play</button>
            </div>`;
        });
        
        html += '<h3 style="color:#ffd700; margin-top:20px;">Past Results</h3>';
        if(results.length === 0) html += '<p>No result</p>';
        results.forEach(r => {
            html += `<div style="background:#222; padding:10px; margin-bottom:10px; border-radius:5px; font-size:12px; overflow-x:auto;">
                <div style="color:#00ffcc; margin-bottom:5px;">${r.date} - <strong>${r.title}</strong> (${r.detail})</div>

    let resultData = [];
    function endGame(title, detail) {
        if(isGameOver) return;
        isGameOver = true;
        document.getElementById('endScreen').style.display = 'flex';
        document.getElementById('endTitle').innerText = title;
        document.getElementById('endTitle').style.color = title.includes('CLEAR') || title.includes('WIN') || title.includes('KNOCKOUT') ? '#00ffcc' : '#ff3366';
        document.getElementById('endMessage').innerText = detail;

        let html = `<table><tr><th>Name</th><th>Team</th><th>Paint (pt)</th><th>Kills</th><th>Deaths</th><th>Specials</th>`;
        if (gameMode === 'salmon') html += `<th>Revives</th><th>Eggs</th>`;
        html += `</tr>`;
        resultData = [];
        let sortedPlayers = [...players].filter(p => !p.salmonType).sort((a, b) => b.paintPoints - a.paintPoints);
        for(let p of sortedPlayers) {
            let tName = p.team === 0 ? 'Blue' : 'Orange';
            html += `<tr><td style="color:${TEAM_COLORS[p.team]}">${p.name}</td><td>${tName}</td><td>${p.paintPoints}</td><td>${p.kills}</td><td>${p.deaths}</td><td>${p.specialCount}</td>`;
            if (gameMode === 'salmon') html += `<td>${p.revives}</td><td>${p.goldenEggsDelivered}</td>`;
            html += `</tr>`;
            let row = [p.name, tName, p.paintPoints, p.kills, p.deaths, p.specialCount];
            if (gameMode === 'salmon') { row.push(p.revives); row.push(p.goldenEggsDelivered); }
            resultData.push(row);
        }
        html += `</table>`;
        document.getElementById('endDetail').innerHTML = html;
        if (title.includes('WIN') || title.includes('CLEAR')) unlockAchievement('first_win', '勝利の美酒 (ゲームクリア/勝利)');
        
        // ローカルストレージに保存
        saveResultToLocal(title, detail, html);
    }

        let csvContent = "data:text/csv;charset=utf-8,Name,Team,Paint,Kills,Deaths,Specials";

        link.click();
        document.body.removeChild(link);

    class SplatZoneObj {
        constructor() { this.w = 300; this.h = 300; this.x = STAGE_W/2 - this.w/2; this.y = STAGE_H/2 - this.h/2; this.teamInControl = -1; }
        update() {
            let startX = Math.max(0, Math.floor(this.x / GRID_SIZE)), endX = Math.min(cols - 1, Math.floor((this.x + this.w) / GRID_SIZE));
            let startY = Math.max(0, Math.floor(this.y / GRID_SIZE)), endY = Math.min(rows - 1, Math.floor((this.y + this.h) / GRID_SIZE));
            let c0 = 0, c1 = 0, total = 0;
            for (let y = startY; y <= endY; y++) { for (let x = startX; x <= endX; x++) { total++; let idx = y * cols + x; if (inkGrid[idx] === 0) c0++; else if (inkGrid[idx] === 1) c1++; } }
            let p0 = c0 / total; let p1 = c1 / total;
            if (p0 > 0.6) this.teamInControl = 0; else if (p1 > 0.6) this.teamInControl = 1; else this.teamInControl = -1; 
        }
        draw() {
            fgCtx.save(); let borderColor = '#fff';
            if (this.teamInControl === 0) { fgCtx.fillStyle = TEAM_COLORS[0] + '44'; fgCtx.fillRect(this.x, this.y, this.w, this.h); borderColor = TEAM_COLORS[0]; }
            else if (this.teamInControl === 1) { fgCtx.fillStyle = TEAM_COLORS[1] + '44'; fgCtx.fillRect(this.x, this.y, this.w, this.h); borderColor = TEAM_COLORS[1]; }
            fgCtx.strokeStyle = borderColor; fgCtx.lineWidth = 4; fgCtx.strokeRect(this.x, this.y, this.w, this.h); fgCtx.restore();
        }
    }

    class RainmakerObj {
        constructor() { this.x = STAGE_W / 2; this.y = STAGE_H / 2; this.state = 'barrier'; this.hp = 300; this.maxHp = 300; this.lastTeam = -1; this.carrier = null; }
        update() {
            if (this.state === 'free') { for (let p of players) if (!p.isDead && Math.hypot(p.x - this.x, p.y - this.y) < 25) { this.state = 'carried'; this.carrier = p; p.hasRainmaker = true; p.prevWeapon = p.weapon; p.setWeapon(WEAPONS.RM_SHOT); p.ink = p.maxInk; break; } }
            else if (this.state === 'carried') {
                this.x = this.carrier.x; this.y = this.carrier.y;
                if (this.carrier.isDead) { this.state = 'free'; this.carrier.hasRainmaker = false; this.carrier = null; } 
                else {
                    let goalX = this.carrier.team === 0 ? STAGE_W - 50 : 50; let dist = Math.abs(this.x - goalX); let count = Math.max(0, Math.floor((dist / (STAGE_W/2)) * 100));
                    bestCount[this.carrier.team] = Math.min(bestCount[this.carrier.team], count); document.getElementById(`c${this.carrier.team}`).innerText = bestCount[this.carrier.team];
                    if (count <= 0) endGame(`${this.carrier.team === 0 ? 'BLUE' : 'ORANGE'} KNOCKOUT!!`, `Rainmaker Reached Goal!`);
                }
            }
        }
        takeDamage(amt, team) {
            if (this.state !== 'barrier') return;
            if (this.lastTeam !== team) this.hp = this.maxHp; this.lastTeam = team; this.hp -= amt;
            if (this.hp <= 0) { splat(this.x, this.y, 250, team, null); for (let p of players) if (!p.isDead && p.team !== team && Math.hypot(p.x - this.x, p.y - this.y) < 250) p.takeDamage(200, {team: team, isPlayer: false, kills:0}); this.state = 'free'; }
        }
        draw() {
            if (this.state === 'carried') return;
            fgCtx.save(); fgCtx.translate(this.x, this.y);
            if (this.state === 'barrier') { let s = 1 + (this.maxHp - this.hp) / this.maxHp * 0.5; fgCtx.scale(s, s); fgCtx.beginPath(); fgCtx.arc(0, 0, 40, 0, Math.PI*2); fgCtx.fillStyle = this.lastTeam === -1 ? 'rgba(255,255,255,0.5)' : TEAM_COLORS[this.lastTeam] + '88'; fgCtx.fill(); fgCtx.lineWidth = 2; fgCtx.strokeStyle = '#fff'; fgCtx.stroke(); }
            fgCtx.fillStyle = '#ffd700'; fgCtx.beginPath(); fgCtx.moveTo(10, 0); fgCtx.lineTo(-10, -10); fgCtx.lineTo(-10, 10); fgCtx.fill(); fgCtx.beginPath(); fgCtx.arc(5, 0, 8, 0, Math.PI*2); fgCtx.fill(); fgCtx.restore();
        }
    }

    class TowerObj {
        constructor() { this.x = STAGE_W / 2; this.y = STAGE_H / 2; this.radius = 40; this.teamInControl = -1; }
        update() {
            let count0 = 0, count1 = 0;
            for(let p of players) { if(!p.isDead && Math.hypot(p.x - this.x, p.y - this.y) < this.radius) { if(p.team === 0) count0++; else count1++; } }
            if(count0 > 0 && count1 === 0) this.teamInControl = 0; else if(count1 > 0 && count0 === 0) this.teamInControl = 1; else if(count0 > 0 && count1 > 0) this.teamInControl = -2; else this.teamInControl = -1;
            
            let speed = 1.5;
            if(this.teamInControl === 0) this.x += speed; else if(this.teamInControl === 1) this.x -= speed; else if(this.teamInControl === -1) { if(this.x > STAGE_W/2 + 2) this.x -= speed * 0.5; else if(this.x < STAGE_W/2 - 2) this.x += speed * 0.5; }
            this.x = Math.max(50, Math.min(STAGE_W - 50, this.x));

            if(this.x > STAGE_W/2) { let count = Math.max(0, Math.floor(((STAGE_W - 50 - this.x) / (STAGE_W/2 - 50)) * 100)); bestCount[0] = Math.min(bestCount[0], count); document.getElementById('c0').innerText = bestCount[0]; if(count <= 0) endGame(`BLUE KNOCKOUT!!`, `Tower Reached Goal!`); } 
            else if (this.x < STAGE_W/2) { let count = Math.max(0, Math.floor(((this.x - 50) / (STAGE_W/2 - 50)) * 100)); bestCount[1] = Math.min(bestCount[1], count); document.getElementById('c1').innerText = bestCount[1]; if(count <= 0) endGame(`ORANGE KNOCKOUT!!`, `Tower Reached Goal!`); }
            if(gameTimeLeft % 10 === 0 && this.teamInControl >= 0) splat(this.x, this.y, this.radius+10, this.teamInControl, null);
        }
        draw() { fgCtx.save(); fgCtx.translate(this.x, this.y); let color = '#ccc'; if(this.teamInControl === 0) color = TEAM_COLORS[0]; else if(this.teamInControl === 1) color = TEAM_COLORS[1]; else if(this.teamInControl === -2) color = '#ff0000'; fgCtx.fillStyle = color; fgCtx.globalAlpha = 0.8; fgCtx.beginPath(); fgCtx.arc(0, 0, this.radius, 0, Math.PI*2); fgCtx.fill(); fgCtx.strokeStyle = '#333'; fgCtx.lineWidth = 4; fgCtx.beginPath(); fgCtx.arc(0, 0, this.radius, 0, Math.PI*2); fgCtx.stroke(); fgCtx.fillStyle = '#555'; fgCtx.fillRect(-5, -5, 10, 10); fgCtx.restore(); }
    }

    class Entity {
        constructor(x, y, team, isPlayer = false, salmonType = null, name = "Bot") {
            this.spawnX = x; this.spawnY = y; this.x = x; this.y = y; this.team = team; this.isPlayer = isPlayer;
            this.salmonType = salmonType; this.hasGoldenEgg = false;
            
            if (!this.isPlayer && !this.salmonType && !name.startsWith("Octarian")) {
                let rt1 = TITLES_1[Math.floor(Math.random()*TITLES_1.length)];
                let rt2 = TITLES_2[Math.floor(Math.random()*TITLES_2.length)];
                this.name = `${rt1} ${rt2} ${name}`;
            } else if (this.isPlayer) {
                this.name = `${document.getElementById('title1').value} ${document.getElementById('title2').value} ${document.getElementById('playerNameInput').value || 'Player'}`;
            } else {
                this.name = name;
            }
            
            this.paintPoints = 0; this.kills = 0; this.deaths = 0; this.specialCount = 0;
            this.revives = 0; this.goldenEggsDelivered = 0;

            this.radius = 12; this.baseSpeed = 3.5; this.angle = 0;
            this.hp = 100; this.maxHp = 100; this.isDead = false; this.respawnTimer = 0;
            this.isLifeRing = false; 
            this.ink = 100; this.maxInk = 100; this.sp = 0; this.maxSp = 180; 
            this.isHiding = false; this.cooldown = 0; this.subCooldown = 0;
            this.isSpecialActive = false; this.specialTimer = 0; this.hasRainmaker = false;
            
            this.isCharging = false; this.isDashing = false; this.chargeTimer = 0; this.dashTimer = 0; this.dashAngle = 0;
            this.prevAttack = false; this.attackHeldTimer = 0;

            if (this.salmonType) { this.setupSalmonid(); } 
            else { let w = Object.values(WEAPONS).find(w => w.id === selectedWeaponId); this.setWeapon(this.isPlayer ? w : wpnArr[Math.floor(Math.random() * wpnArr.length)]); }
            this.targetX = x; this.targetY = y; this.stateTimer = 0;
        }
        
        setupSalmonid() {
            this.setWeapon(WEAPONS.SALMON_MELEE);
            if (Math.random() > 0.5) { this.x = Math.random() > 0.5 ? -20 : STAGE_W+20; this.y = Math.random() * STAGE_H; } else { this.y = Math.random() > 0.5 ? -20 : STAGE_H+20; this.x = Math.random() * STAGE_W; }
            let hMulti = 1 + (hazardLevel / 100) * 1.5; 

            if(this.salmonType === 'OKASHIRA') { this.maxHp = this.hp = (5000 * hMulti)/2; this.radius = 60; this.baseSpeed = 1.0; }
            else if(this.salmonType === 'TOWER') { this.maxHp = this.hp = (300 * hMulti)/2; this.radius = 15; this.baseSpeed = 0.5; this.weapon = WEAPONS.SPLATCHARGER; }
            else if(this.salmonType === 'BAKUDAN') { this.maxHp = this.hp = (400 * hMulti)/2; this.radius = 25; this.baseSpeed = 1.2 + (hazardLevel/333); }
            else if(this.salmonType === 'TOSSHIN') { this.maxHp = this.hp = (350 * hMulti)/2; this.radius = 20; this.baseSpeed = 2.0 + (hazardLevel/333)*1.5; }
            else if(this.salmonType === 'HEBI') { this.maxHp = this.hp = (500 * hMulti)/2; this.radius = 20; this.baseSpeed = 1.5 + (hazardLevel/333)*1.5; }
            else if(this.salmonType === 'MOGURA') { this.maxHp = this.hp = (400 * hMulti)/2; this.radius = 25; this.baseSpeed = 2.5 + (hazardLevel/333)*2.0; }
            else { this.maxHp = this.hp = (100 * hMulti)/2; this.radius = 12; this.baseSpeed = 2.5 + (hazardLevel/333)*2.5; }
        }
        
        setWeapon(w) { this.weapon = w; if (this.isPlayer && w.id !== 99) document.getElementById('kitInfo').innerText = `${w.name} / ${w.sub} / ${w.sp}`; }
        
        revive() {
            if(!this.isDead || !this.isLifeRing) return;
            this.isDead = false; this.isLifeRing = false; this.hp = this.maxHp; this.ink = this.maxInk;
        }

        update() {
            if (this.isSharking) {
                this.specialTimer--;

    class Bullet {
        constructor(x, y, angle, team, weapon, attacker) { this.x = x; this.y = y; this.vx = Math.cos(angle) * weapon.bulletSpeed; this.vy = Math.sin(angle) * weapon.bulletSpeed; this.team = team; this.weapon = weapon; this.life = 20 + (Math.random() * 5); this.radius = [11,12,13].includes(weapon.id) ? 4 : (weapon.id===99? 12: 5); this.attacker = attacker; this.damage = weapon.damage; }

    }

    function splat(cx, cy, radius, team, attacker, isReplay = false) {
        if (!isReplay && !isReplayMode && !isGameOver) {
            replaySplatEvents.push({ f: frameCount, cx: Math.round(cx), cy: Math.round(cy), r: Math.round(radius), t: team });
        }
        bgCtx.fillStyle = TEAM_COLORS[team]; bgCtx.beginPath();
        for (let i = 0; i < Math.PI * 2; i += 0.5) { let r = radius * (0.8 + Math.random() * 0.2); let x = cx + Math.cos(i) * r; let y = cy + Math.sin(i) * r; if (i === 0) bgCtx.moveTo(x, y); else bgCtx.lineTo(x, y); }
        bgCtx.closePath(); bgCtx.fill();
        let startX = Math.max(0, Math.floor((cx - radius) / GRID_SIZE)), endX = Math.min(cols - 1, Math.floor((cx + radius) / GRID_SIZE)), startY = Math.max(0, Math.floor((cy - radius) / GRID_SIZE)), endY = Math.min(rows - 1, Math.floor((cy + radius) / GRID_SIZE));
        let paintedCount = 0; let rSq = radius * radius;
        for (let y = startY; y <= endY; y++) { for (let x = startX; x <= endX; x++) { let dx = cx - (x * GRID_SIZE + GRID_SIZE/2), dy = cy - (y * GRID_SIZE + GRID_SIZE/2); if (dx*dx + dy*dy <= rSq) { let idx = y * cols + x; if (inkGrid[idx] !== team) { inkGrid[idx] = team; paintedCount++; } } } }
        return attacker ? paintedCount : 0; 
    }

    function updateScore() {
        if(isGameOver) return {p0:0, p1:0};

        for (let i = 0; i < inkGrid.length; i++) { if (inkGrid[i] === 0) c0++; else if (inkGrid[i] === 1) c1++; }
        let p0 = Math.floor((c0 / total) * 100); let p1 = Math.floor((c1 / total) * 100);
        document.getElementById('score0').innerText = `Blue: ${p0}%`; document.getElementById('score1').innerText = `Orange: ${p1}%`;
        return {p0, p1};
    }

    function checkTimeUp() {
        if (gameMode === 'salmon') {
            if (!isExtraWave) {
                if (eggCount >= eggQuota) { if (currentWave < 3) { currentWave++; startWave(); return true; } else { isExtraWave = true; startWave(); return true; } } 
                else { endGame('WORK OVER...', `Wave ${currentWave} Failed... Need ${eggQuota} Eggs`); return false; }
            } else { endGame('WORK OVER...', `Failed to defeat Okashira...`); return false; }
        } else if (gameMode === 'hero') {
            endGame('GAME OVER...', `Failed to reach the goal in time!`); return false;
        } else if (gameMode === 'turf') {
            let res = updateScore();
            if(res.p0 > res.p1) endGame('BLUE WINS!', `Turf: ${res.p0}% vs ${res.p1}%`); else if(res.p1 > res.p0) endGame('ORANGE WINS!', `Turf: ${res.p0}% vs ${res.p1}%`); else endGame('DRAW!', `Turf: ${res.p0}% vs ${res.p1}%`);
            return false;
        } else {
            if(bestCount[0] < bestCount[1]) endGame('BLUE WINS!', `Count: ${bestCount[0]} vs ${bestCount[1]}`); else if(bestCount[1] < bestCount[0]) endGame('ORANGE WINS!', `Count: ${bestCount[0]} vs ${bestCount[1]}`); else { let res = updateScore(); if(res.p0 >= res.p1) endGame('BLUE WINS!', `Same Count. Turf: ${res.p0}% vs ${res.p1}%`); else endGame('ORANGE WINS!', `Same Count. Turf: ${res.p0}% vs ${res.p1}%`); }
            return false;
        }
    }

    function startWave() {
        gameTimeLeft = 100; document.getElementById('salmonWaveText').innerText = isExtraWave ? 'EXTRA WAVE' : `WAVE ${currentWave}`;
        let pCount = players.filter(p => p.team === 0).length; let quotaBase = pCount > 4 ? 25 : 10;
        eggQuota = Math.floor(quotaBase * (1 + (hazardLevel / 100)) + (currentWave * 5));

        if (isExtraWave) {
            document.getElementById('salmonWaveText').style.color = '#ff0000'; document.getElementById('okashiraHpUi').style.display = 'block';
            players = players.filter(p => p.team === 0); players.push(new Entity(STAGE_W/2, STAGE_H/2, 1, false, 'OKASHIRA'));
        } else {
            eggCount = 0; document.getElementById('salmonEggCount').innerText = `0 / ${eggQuota}`;
            players = players.filter(p => p.team === 0);
            let initChum = Math.floor(6 * (1 + (hazardLevel / 100)));
            for(let i=0; i<initChum; i++) players.push(new Entity(0, 0, 1, false, 'CHUM'));
        }
    }

    function spawnSalmonid() {
        if(isExtraWave) return;
        let types = ['CHUM', 'CHUM', 'TOWER', 'BAKUDAN', 'TOSSHIN', 'HEBI', 'MOGURA'];
        let type = types[Math.floor(Math.random() * types.length)];
        let enemyCount = players.filter(p => p.team === 1 && !p.isDead).length;
        let maxEnemy = Math.min(40, 10 + Math.floor((hazardLevel / 100) * 10)); 
        if (enemyCount < maxEnemy) players.push(new Entity(0, 0, 1, false, type));
    }

    function startGame(teamSize, mode) {
        gameMode = mode; isGameOver = false; bestCount = [100, 100];
        document.getElementById('homeScreen').style.display = 'none';
        
        STAGE_W = width * 2; STAGE_H = height * 2;
        bgCanvas.width = STAGE_W; bgCanvas.height = STAGE_H;
        fgCanvas.width = STAGE_W; fgCanvas.height = STAGE_H;
        cols = Math.ceil(STAGE_W / GRID_SIZE); rows = Math.ceil(STAGE_H / GRID_SIZE);
        basket = { x: STAGE_W / 2, y: STAGE_H / 2, radius: 40 };
        currentStageBg = document.getElementById('stageSelect').value;

        replayFrames = []; replaySplatEvents = []; replayKillEvents = []; isReplayMode = false;
        frameCount = 0;

        clams = []; clamBaskets = [];

            document.getElementById('clamUi').style.display = 'block';
        } else if (document.getElementById('clamUi')) document.getElementById('clamUi').style.display = 'none';

        if (mode === 'salmon') {

            document.getElementById('salmonUi').style.display = 'block';
            currentWave = 1; isExtraWave = false; 
        } else {

            if (mode !== 'turf' && mode !== 'hero') { document.getElementById('gachiUi').style.display = 'block'; document.getElementById('gachiModeName').innerText = mode === 'rainmaker' ? 'Rainmaker' : (mode === 'tower' ? 'Tower Control' : 'Splat Zones'); document.getElementById('c0').innerText = 100; document.getElementById('c1').innerText = 100; }
        }

        if(mode === 'rainmaker') rainmaker = new RainmakerObj(); else if(mode === 'tower') tower = new TowerObj(); else if(mode === 'zones') splatZone = new SplatZoneObj();
        if (isMobile) ['joyLeft', 'joyRight', 'btnHide', 'btnSub', 'btnSp'].forEach(id => document.getElementById(id).style.display = 'block');

        inkGrid = new Array(cols * rows).fill(-1);
        players = []; bullets = []; bombs = []; strikes = []; goldenEggs = [];
        bgCtx.fillStyle = currentStageBg; bgCtx.fillRect(0, 0, STAGE_W, STAGE_H);

        clams = []; clamBaskets = [];
        if (mode === 'clam') {
            clamBaskets = [{x: 150, y: STAGE_H/2, team: 0}, {x: STAGE_W-150, y: STAGE_H/2, team: 1}];
            document.getElementById('clamUi').style.display = 'block';
        } else if (document.getElementById('clamUi')) document.getElementById('clamUi').style.display = 'none';

        if (mode === 'salmon') {
            players.push(new Entity(STAGE_W/2 - 50, STAGE_H/2, 0, true, null));
            for(let i=1; i<teamSize; i++) players.push(new Entity(STAGE_W/2 + (Math.random()-0.5)*100, STAGE_H/2 + (Math.random()-0.5)*100, 0, false, null, `Bot ${i}`));
            startWave(); 
        } else if (mode === 'hero') {
            players.push(new Entity(100, STAGE_H / 2, 0, true, null));
            let bosses = ['YOKOZUNA', 'TATSU', 'JOE'];
            if (heroStage === 1) {
                players.push(new Entity(STAGE_W - 100, STAGE_H / 2, 1, false, bosses[Math.floor(Math.random() * bosses.length)]));
            } else {
                players.push(new Entity(STAGE_W - 150, STAGE_H / 2 - 150, 1, false, 'YOKOZUNA'));
                players.push(new Entity(STAGE_W - 100, STAGE_H / 2, 1, false, 'TATSU'));
                players.push(new Entity(STAGE_W - 150, STAGE_H / 2 + 150, 1, false, 'JOE'));
            }
        } else {
            players.push(new Entity(STAGE_W * 0.1, STAGE_H / 2, 0, true, null)); 
            for(let i=1; i<teamSize; i++) players.push(new Entity(STAGE_W * 0.1, STAGE_H * (i/(teamSize+1)), 0, false, null, `Blue ${i}`)); 
            for(let i=0; i<teamSize; i++) players.push(new Entity(STAGE_W * 0.9, STAGE_H * ((i+1)/(teamSize+1)), 1, false, null, `Orange ${i}`)); 
        }

        unlockAchievement('first_play', '初めてのバトル');
        lastTime = performance.now();
        if(gameLoopId) cancelAnimationFrame(gameLoopId);
        gameLoop();
    }

    function gameLoop(timestamp) {
        if(isGameOver) return;
        frameCount++; fgCtx.clearRect(0, 0, STAGE_W, STAGE_H);

        if (!isReplayMode && !isGameOver) {
            let frameData = {
                p: players.map(p => ({ x: p.x, y: p.y, a: p.angle, d: p.isDead, lr: p.isLifeRing, t: p.team, w: p.weapon?.id, st: p.salmonType, nm: p.name, hp: p.hp, mHp: p.maxHp, eg: p.hasGoldenEgg, sp: p.isSpecialActive, spt: p.specialTimer, cg: p.isCharging })),
                b: bullets.map(b => ({ x: b.x, y: b.y, t: b.team, r: b.radius, w: b.weapon?.id })),
                s: strikes.map(s => ({ x: s.x, y: s.y, t: s.team, r: s.radius, tm: s.timer })),
                rm: rainmaker ? { x: rainmaker.x, y: rainmaker.y, s: rainmaker.state } : null,
                tw: tower ? { x: tower.x, y: tower.y, c: tower.teamInControl } : null,
                sz: splatZone ? { c: splatZone.teamInControl } : null,
                egs: goldenEggs.map(e => ({ x: e.x, y: e.y })),
                cls: clams.map(c => ({x: c.x, y: c.y, a: c.active})),
                cbs: clamBaskets.map(b => ({x: b.x, y: b.y, t: b.team, c: bestCount[b.team]}))
            };
            replayFrames.push(frameData);
        }

        let mainP = players.find(p => p.isPlayer);
        if(mainP) { camX = Math.max(0, Math.min(STAGE_W - width, mainP.x - width / 2)); camY = Math.max(0, Math.min(STAGE_H - height, mainP.y - height / 2)); }
        bgCanvas.style.transform = `translate(${-camX}px, ${-camY}px)`;
        fgCanvas.style.transform = `translate(${-camX}px, ${-camY}px)`;

        if(gameMode === 'rainmaker' || gameMode === 'tower') { fgCtx.fillStyle = 'rgba(0, 123, 255, 0.3)'; fgCtx.fillRect(STAGE_W - 80, 0, 80, STAGE_H); fgCtx.fillStyle = 'rgba(255, 127, 0, 0.3)'; fgCtx.fillRect(0, 0, 80, STAGE_H); fgCtx.fillStyle = '#fff'; fgCtx.font = '20px Arial'; fgCtx.fillText("GOAL", STAGE_W - 70, STAGE_H/2); fgCtx.fillText("GOAL", 10, STAGE_H/2); } 
        else if (gameMode === 'salmon') { fgCtx.fillStyle = 'rgba(0, 0, 0, 0.2)'; fgCtx.beginPath(); fgCtx.arc(basket.x, basket.y, basket.radius+10, 0, Math.PI*2); fgCtx.fill(); fgCtx.strokeStyle = '#ffcc00'; fgCtx.lineWidth = 4; fgCtx.beginPath(); fgCtx.arc(basket.x, basket.y, basket.radius, 0, Math.PI*2); fgCtx.stroke(); fgCtx.fillStyle = '#fff'; fgCtx.font = '16px Arial'; fgCtx.fillText("BASKET", basket.x - 35, basket.y + 5); }
        else if (gameMode === 'hero') { /* Boss fight logic handled in takeDamage */ }

        if(timestamp - lastTime >= 1000) {
            lastTime = timestamp; gameTimeLeft--;
            let m = Math.floor(gameTimeLeft / 60); let s = gameTimeLeft % 60;
            document.getElementById('timerBox').innerText = `${m}:${s.toString().padStart(2, '0')}`;
            if(gameMode !== 'salmon' && gameMode !== 'hero' && gameTimeLeft % 2 === 0) updateScore();
            if(gameMode === 'zones' && splatZone && splatZone.teamInControl >= 0) { bestCount[splatZone.teamInControl]--; document.getElementById(`c${splatZone.teamInControl}`).innerText = bestCount[splatZone.teamInControl]; if(bestCount[splatZone.teamInControl] <= 0) endGame(`${splatZone.teamInControl === 0 ? 'BLUE' : 'ORANGE'} KNOCKOUT!!`, `Splat Zone Secured!`); }
            if(gameTimeLeft <= 0) { 
                let continues = checkTimeUp(); 
                if(!continues) return; 
            }
        }

        if(gameMode === 'salmon') {
            let alivePlayers = players.filter(p => p.team === 0 && (!p.isDead || !p.isLifeRing));
            if (alivePlayers.length === 0) { endGame('WORK OVER...', '全滅した...'); return; }
            let spawnFreq = Math.max(15, Math.floor(90 - (hazardLevel / 333) * 75)); 
            if(frameCount % spawnFreq === 0 && !isExtraWave) spawnSalmonid(); 

            for(let i = goldenEggs.length-1; i>=0; i--) {
                let egg = goldenEggs[i]; fgCtx.fillStyle = '#ffd700'; fgCtx.beginPath(); fgCtx.arc(egg.x, egg.y, 6, 0, Math.PI*2); fgCtx.fill(); fgCtx.strokeStyle='#fff'; fgCtx.stroke();
                for(let p of players) { if (p.team === 0 && !p.isDead && !p.hasGoldenEgg && Math.hypot(p.x - egg.x, p.y - egg.y) < p.radius + 10) { p.hasGoldenEgg = true; goldenEggs.splice(i, 1); break; } }
            }
        }

        if(gameMode === 'rainmaker' && rainmaker) { rainmaker.update(); rainmaker.draw(); }
        else if(gameMode === 'tower' && tower) { tower.update(); tower.draw(); }
        else if(gameMode === 'zones' && splatZone) { splatZone.update(); splatZone.draw(); }
        else if(gameMode === 'clam') {
            if (document.getElementById('myClams')) document.getElementById('myClams').innerText = mainP ? (mainP.clams||0) : 0;
            if(frameCount % 10 === 0 && clams.filter(c=>c.active).length < 60) {
                clams.push({x: 100 + Math.random()*(STAGE_W-200), y: 100 + Math.random()*(STAGE_H-200), active: true});
                clams.push({x: 100 + Math.random()*(STAGE_W-200), y: 100 + Math.random()*(STAGE_H-200), active: true});
                clams.push({x: 100 + Math.random()*(STAGE_W-200), y: 100 + Math.random()*(STAGE_H-200), active: true});
            }
            clamBaskets.forEach(b => { fgCtx.fillStyle = TEAM_COLORS[b.team]; fgCtx.beginPath(); fgCtx.arc(b.x, b.y, 40, 0, Math.PI*2); fgCtx.fill(); fgCtx.strokeStyle = '#fff'; fgCtx.lineWidth = 4; fgCtx.stroke(); fgCtx.fillStyle = '#fff'; fgCtx.font = "20px Arial"; fgCtx.fillText(bestCount[b.team], b.x-15, b.y+5); });
            clams.forEach(c => { if(c.active) { fgCtx.fillStyle = '#fff'; fgCtx.beginPath(); fgCtx.arc(c.x, c.y, 8, 0, Math.PI*2); fgCtx.fill(); fgCtx.strokeStyle = '#ff69b4'; fgCtx.lineWidth = 2; fgCtx.stroke(); } });
        }

        for (let i = players.length - 1; i >= 0; i--) { let p = players[i]; if(p.isDead && !p.isLifeRing && p.salmonType) players.splice(i, 1); else { p.update(); p.draw(); } }
        for (let i = bullets.length - 1; i >= 0; i--) { if (!bullets[i].update()) bullets.splice(i, 1); else bullets[i].draw(); }
        for (let i = bombs.length - 1; i >= 0; i--) { if (!bombs[i].update()) bombs.splice(i, 1); else bombs[i].draw(); }
        for (let i = strikes.length - 1; i >= 0; i--) { if (!strikes[i].update()) strikes.splice(i, 1); else strikes[i].draw(); }

        if(!isGameOver) gameLoopId = requestAnimationFrame(gameLoop);
    }

    // --- Replay System ---
    function startReplay() {
        isReplayMode = true; isGameOver = false;
        document.getElementById('endScreen').style.display = 'none';
        document.getElementById('uiLeft').style.display = 'block';
        bgCtx.fillStyle = currentStageBg; bgCtx.fillRect(0, 0, STAGE_W, STAGE_H);
        inkGrid.fill(-1);
        replayCurrentFrame = 0; replayTargetIndex = 0;
        showKillLog("BATTLE MEMORY START");
        lastTime = performance.now();
        gameLoopId = requestAnimationFrame(replayLoop);
    }

    function startMemoryReplay(index) {
        let memories = JSON.parse(localStorage.getItem('splatoon_memories') || '[]');
        let mem = memories[index];
        if(!mem) return;
        
        isReplayMode = true; isGameOver = false;
        document.getElementById('recordsScreen').style.display = 'none';
        document.getElementById('homeScreen').style.display = 'none';
        document.getElementById('uiLeft').style.display = 'block';
        
        STAGE_W = mem.stage_w || width*2; STAGE_H = mem.stage_h || height*2;
        bgCanvas.width = STAGE_W; bgCanvas.height = STAGE_H;
        fgCanvas.width = STAGE_W; fgCanvas.height = STAGE_H;
        currentStageBg = mem.stage_c || '#e0e0e0';
        
        bgCtx.fillStyle = currentStageBg; bgCtx.fillRect(0, 0, STAGE_W, STAGE_H);
        inkGrid.fill(-1);
        
        replayFrames = mem.frames; replaySplatEvents = mem.events.splats; replayKillEvents = mem.events.kills;
        replayCurrentFrame = 0; replayTargetIndex = 0;
        
        showKillLog("BATTLE MEMORY START");
        lastTime = performance.now();
        gameLoopId = requestAnimationFrame(replayLoop);
    }

    function replayLoop(timestamp) {
        if(!isReplayMode) return;
        fgCtx.clearRect(0, 0, STAGE_W, STAGE_H);
        
        if (replayCurrentFrame >= replayFrames.length) {
            endGame('REPLAY END', 'バトルメモリーの再生が終了しました。');
            isReplayMode = false;
            return;
        }
        
        let frameData = replayFrames[replayCurrentFrame];
        
        while(replaySplatEvents.length > 0 && replaySplatEvents[0].f === replayCurrentFrame) {
            let ev = replaySplatEvents.shift(); splat(ev.cx, ev.cy, ev.r, ev.t, null, true); 
        }
        while(replayKillEvents.length > 0 && replayKillEvents[0].f === replayCurrentFrame) {
            let ev = replayKillEvents.shift(); showKillLog(`【実況】${ev.killer} が ${ev.victim} を倒した！`);
        }

        if (mouse.down && !prevMouseDownReplay) replayTargetIndex = (replayTargetIndex + 1) % frameData.p.length;
        prevMouseDownReplay = mouse.down;

        let mainP = frameData.p[replayTargetIndex];
        if (mainP) { camX = Math.max(0, Math.min(STAGE_W - width, mainP.x - width / 2)); camY = Math.max(0, Math.min(STAGE_H - height, mainP.y - height / 2)); }
        bgCanvas.style.transform = `translate(${-camX}px, ${-camY}px)`; fgCanvas.style.transform = `translate(${-camX}px, ${-camY}px)`;

        if(gameMode === 'rainmaker' || gameMode === 'tower') { fgCtx.fillStyle = 'rgba(0, 123, 255, 0.3)'; fgCtx.fillRect(STAGE_W - 80, 0, 80, STAGE_H); fgCtx.fillStyle = 'rgba(255, 127, 0, 0.3)'; fgCtx.fillRect(0, 0, 80, STAGE_H); fgCtx.fillStyle = '#fff'; fgCtx.font = '20px Arial'; fgCtx.fillText("GOAL", STAGE_W - 70, STAGE_H/2); fgCtx.fillText("GOAL", 10, STAGE_H/2); } 
        else if (gameMode === 'salmon') { fgCtx.fillStyle = 'rgba(0, 0, 0, 0.2)'; fgCtx.beginPath(); fgCtx.arc(basket.x, basket.y, basket.radius+10, 0, Math.PI*2); fgCtx.fill(); fgCtx.strokeStyle = '#ffcc00'; fgCtx.lineWidth = 4; fgCtx.beginPath(); fgCtx.arc(basket.x, basket.y, basket.radius, 0, Math.PI*2); fgCtx.stroke(); fgCtx.fillStyle = '#fff'; fgCtx.font = '16px Arial'; fgCtx.fillText("BASKET", basket.x - 35, basket.y + 5); }
        else if (gameMode === 'hero') { fgCtx.fillStyle = '#ffea00'; fgCtx.beginPath(); fgCtx.arc(STAGE_W - 100, STAGE_H / 2, 60, 0, Math.PI*2); fgCtx.fill(); fgCtx.fillStyle = '#000'; fgCtx.font = '20px Arial'; fgCtx.fillText("GOAL", STAGE_W - 130, STAGE_H / 2 + 5); }

        if(frameData.rm) {
            let rm = frameData.rm;
            if (rm.s !== 'carried') { fgCtx.save(); fgCtx.translate(rm.x, rm.y); if (rm.s === 'barrier') { fgCtx.beginPath(); fgCtx.arc(0, 0, 40, 0, Math.PI*2); fgCtx.fillStyle = 'rgba(255,255,255,0.5)'; fgCtx.fill(); fgCtx.lineWidth = 2; fgCtx.strokeStyle = '#fff'; fgCtx.stroke(); } fgCtx.fillStyle = '#ffd700'; fgCtx.beginPath(); fgCtx.moveTo(10, 0); fgCtx.lineTo(-10, -10); fgCtx.lineTo(-10, 10); fgCtx.fill(); fgCtx.beginPath(); fgCtx.arc(5, 0, 8, 0, Math.PI*2); fgCtx.fill(); fgCtx.restore(); }
        }
        if(frameData.tw) { let tw = frameData.tw; fgCtx.save(); fgCtx.translate(tw.x, tw.y); let color = '#ccc'; if(tw.c === 0) color = TEAM_COLORS[0]; else if(tw.c === 1) color = TEAM_COLORS[1]; else if(tw.c === -2) color = '#ff0000'; fgCtx.fillStyle = color; fgCtx.globalAlpha = 0.8; fgCtx.beginPath(); fgCtx.arc(0, 0, 40, 0, Math.PI*2); fgCtx.fill(); fgCtx.strokeStyle = '#333'; fgCtx.lineWidth = 4; fgCtx.beginPath(); fgCtx.arc(0, 0, 40, 0, Math.PI*2); fgCtx.stroke(); fgCtx.fillStyle = '#555'; fgCtx.fillRect(-5, -5, 10, 10); fgCtx.restore(); }
        if(frameData.sz) { let sz = frameData.sz; fgCtx.save(); let borderColor = '#fff'; let zx = STAGE_W/2 - 150; let zy = STAGE_H/2 - 150; if (sz.c === 0) { fgCtx.fillStyle = TEAM_COLORS[0] + '44'; fgCtx.fillRect(zx, zy, 300, 300); borderColor = TEAM_COLORS[0]; } else if (sz.c === 1) { fgCtx.fillStyle = TEAM_COLORS[1] + '44'; fgCtx.fillRect(zx, zy, 300, 300); borderColor = TEAM_COLORS[1]; } fgCtx.strokeStyle = borderColor; fgCtx.lineWidth = 4; fgCtx.strokeRect(zx, zy, 300, 300); fgCtx.restore(); }

        for(let egg of frameData.egs) { fgCtx.fillStyle = '#ffd700'; fgCtx.beginPath(); fgCtx.arc(egg.x, egg.y, 6, 0, Math.PI*2); fgCtx.fill(); fgCtx.strokeStyle='#fff'; fgCtx.stroke(); }
        if(frameData.s) { for(let s of frameData.s) { fgCtx.strokeStyle = TEAM_COLORS[s.t]; fgCtx.lineWidth = 3; fgCtx.setLineDash([10, 15]); fgCtx.beginPath(); fgCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2); fgCtx.stroke(); fgCtx.setLineDash([]); fgCtx.fillStyle = TEAM_COLORS[s.t] + '88'; fgCtx.beginPath(); fgCtx.arc(s.x, s.y, s.r * (1 - s.tm/90), 0, Math.PI * 2); fgCtx.fill(); } }
        for(let b of frameData.b) { fgCtx.fillStyle = b.w === 99 ? '#ffd700' : TEAM_COLORS[b.t]; fgCtx.beginPath(); fgCtx.arc(b.x, b.y, b.r, 0, Math.PI * 2); fgCtx.fill(); }
        
        for(let p of frameData.p) {
            if (p.d && !p.lr) continue;
            fgCtx.save(); fgCtx.translate(p.x, p.y);
            let radius = p.st === 'OKASHIRA' ? 60 : (p.st === 'BAKUDAN' || p.st === 'MOGURA' ? 25 : (p.st === 'HEBI' || p.st === 'TOSSHIN' ? 20 : (p.st === 'TOWER' ? 15 : 12)));
            if (p.lr) { fgCtx.strokeStyle = '#ff7f00'; fgCtx.lineWidth = 6; fgCtx.beginPath(); fgCtx.arc(0, 0, radius, 0, Math.PI*2); fgCtx.stroke(); fgCtx.fillStyle = '#fff'; fgCtx.font = '10px Arial'; fgCtx.fillText("HELP", -12, 4); fgCtx.restore(); continue; }
            
            if (p.sp && p.w !== 4 && p.w !== 26 && p.w !== 28) { fgCtx.beginPath(); fgCtx.arc(0, 0, 160, 0, Math.PI * 2); fgCtx.fillStyle = TEAM_COLORS[p.t] + '33'; fgCtx.fill(); }
            if (p.w === 22 && p.cg) {
                fgCtx.strokeStyle = `rgba(255,255,255,0.8)`; fgCtx.lineWidth = 4;
                fgCtx.beginPath(); fgCtx.arc(0, 0, radius+15, Math.PI/2, 3*Math.PI/2); fgCtx.stroke(); // Flipped angle for replay to show visually
            }
            if (p.hp < p.mHp && !p.sp && p.st !== 'OKASHIRA') { fgCtx.fillStyle = '#ff0000'; fgCtx.fillRect(-15, -20, 30, 4); fgCtx.fillStyle = '#00ff00'; fgCtx.fillRect(-15, -20, 30 * (Math.max(0, p.hp) / p.mHp), 4); }
            
            fgCtx.rotate(p.a);
            let color = TEAM_COLORS[p.t]; if(p.st === 'CHUM') color = '#ff4500'; else if(p.st) color = '#8b0000';
            if(p.st === 'MOGURA') fgCtx.globalAlpha = p.cg ? 1.0 : 0.3;

            fgCtx.fillStyle = color; fgCtx.beginPath(); fgCtx.arc(0, 0, radius, 0, Math.PI * 2); fgCtx.fill();
            fgCtx.lineWidth = 2; fgCtx.strokeStyle = p.nm === document.getElementById('playerNameInput').value ? "#fff" : "#000"; fgCtx.stroke(); fgCtx.globalAlpha = 1.0;

            if (p.st) { 
                fgCtx.fillStyle = '#fff'; fgCtx.beginPath(); fgCtx.arc(radius-6, -6, 4, 0, Math.PI*2); fgCtx.arc(radius-6, 6, 4, 0, Math.PI*2); fgCtx.fill(); 
                if(p.st === 'OKASHIRA' || p.st === 'HEBI') { fgCtx.fillStyle='#ff0'; fgCtx.fillRect(radius, -10, 10, 20); } 
                if(p.st === 'TOSSHIN' && p.cg) { fgCtx.fillStyle='rgba(255,255,0,0.5)'; fgCtx.beginPath(); fgCtx.arc(0, 0, radius+5, 0, Math.PI*2); fgCtx.fill(); }
                if(p.st === 'MOGURA' && p.cg) { fgCtx.fillStyle='#f00'; fgCtx.beginPath(); fgCtx.arc(radius, 0, 15, 0, Math.PI*2); fgCtx.fill(); }
            } 
            else { 
                fgCtx.fillStyle = '#333'; 
                if (p.w === 0 || p.w === 1 || p.w === 2 || p.w === 3 || p.w === 4) { fgCtx.fillRect(radius - 2, -4, 12, 8); } 
                else if (p.w === 5 || p.w === 6 || p.w === 7) { fgCtx.fillRect(radius - 2, -2, 10, 4); fgCtx.fillStyle = TEAM_COLORS[p.t]; fgCtx.fillRect(radius + 6, -15, 6, 30); } 
                else if (p.w === 8 || p.w === 9 || p.w === 10 || p.w === 99) { fgCtx.fillRect(radius - 2, -6, 15, 12); fgCtx.fillStyle = p.w===99 ? '#ffd700' : TEAM_COLORS[p.t]; fgCtx.fillRect(radius + 13, -8, 8, 16); }
                else if (p.w === 11 || p.w === 12 || p.w === 13) { fgCtx.fillRect(radius - 2, -3, 25, 6); }
                else if (p.w === 14 || p.w === 15 || p.w === 16) { fgCtx.fillRect(radius - 2, -8, 12, 16); fgCtx.fillStyle = TEAM_COLORS[p.t]; fgCtx.beginPath(); fgCtx.arc(radius+10, 0, 8, 0, Math.PI*2); fgCtx.fill(); }
                else if (p.w === 17 || p.w === 18) { fgCtx.fillRect(radius - 2, -1, 15, 2); fgCtx.fillStyle = TEAM_COLORS[p.t]; fgCtx.fillRect(radius + 13, -8, 4, 16); }
                else if (p.w === 19) { fgCtx.fillRect(radius - 2, -8, 8, 16); fgCtx.fillRect(radius - 2, 4, 8, 16); }
                else if (p.w === 20) { fgCtx.fillRect(radius - 2, -2, 20, 4); fgCtx.fillStyle = '#777'; fgCtx.fillRect(radius + 18, -10, 4, 20); }
                else if (p.w === 21) { fgCtx.fillRect(radius - 2, -15, 5, 30); fgCtx.fillStyle = TEAM_COLORS[p.t]; fgCtx.fillRect(radius + 3, -15, 2, 30); }
                else if (p.w === 22) { fgCtx.fillRect(radius - 2, -4, 15, 8); fgCtx.fillStyle = TEAM_COLORS[p.t]; fgCtx.beginPath(); fgCtx.arc(radius + 13, 0, 12, -Math.PI/2, Math.PI/2); fgCtx.fill(); }
                else if (p.w === 23) { fgCtx.fillRect(radius - 2, -4, 12, 8); fgCtx.fillStyle = '#ff1493'; fgCtx.fillRect(radius + 4, -4, 4, 8); }
                else if (p.w === 24) { fgCtx.fillRect(radius - 2, -2, 10, 4); fgCtx.fillStyle = '#ffd700'; fgCtx.fillRect(radius + 6, -15, 6, 30); }
                else if (p.w === 25) { fgCtx.fillRect(radius - 2, -8, 8, 16); fgCtx.fillRect(radius - 2, 4, 8, 16); fgCtx.fillStyle = '#ff1493'; fgCtx.fillRect(radius, -6, 2, 12); }
                else if (p.w === 26) { fgCtx.fillRect(radius - 2, -2, 20, 4); fgCtx.fillStyle = '#ffd700'; fgCtx.fillRect(radius + 18, -10, 4, 20); }
                else if (p.w === 27) { fgCtx.fillRect(radius - 2, -2, 15, 4); fgCtx.fillStyle = TEAM_COLORS[p.t]; fgCtx.beginPath(); fgCtx.arc(radius + 15, 0, 8, 0, Math.PI*2); fgCtx.fill(); }
            }
            fgCtx.restore();
            
            if (p.cg && [11,12,13].includes(p.w)) { fgCtx.strokeStyle = TEAM_COLORS[p.t] + '88'; fgCtx.lineWidth = 2; fgCtx.beginPath(); fgCtx.moveTo(p.x, p.y); fgCtx.lineTo(p.x + Math.cos(p.a) * 300, p.y + Math.sin(p.a) * 300); fgCtx.stroke(); }
            if(!p.st && p.nm !== document.getElementById('playerNameInput').value) { fgCtx.fillStyle = '#fff'; fgCtx.font = '10px Arial'; fgCtx.fillText(p.nm, p.x - 10, p.y - 15); }
            if (p.eg) { fgCtx.fillStyle = '#ffd700'; fgCtx.beginPath(); fgCtx.arc(p.x, p.y - 15, 6, 0, Math.PI*2); fgCtx.fill(); fgCtx.strokeStyle='#fff'; fgCtx.stroke(); }
        }
        
        fgCtx.fillStyle = '#fff'; fgCtx.font = '24px Arial'; fgCtx.shadowBlur = 4; fgCtx.shadowColor = '#000';
        fgCtx.fillText(`[BATTLE MEMORY] 視点: ${mainP?mainP.nm:'None'} (クリックで変更)`, camX + 10, camY + 80);
        fgCtx.shadowBlur = 0;

        replayCurrentFrame++;
        gameLoopId = requestAnimationFrame(replayLoop);
    }
</script>
